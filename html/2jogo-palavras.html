<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Palavras</title>
    <link rel="stylesheet" href="../css/style-jogo-palavras.css">
</head>
<body>
    <main>
        <div class="container">
            <a class="voltar" href="../index.html"><h2>Voltar</h2></a>
            <div class="ranking">

                <div class="time primeiro" id="timeA">
                    <span>Reino do Sul</span>
                    <span id="placarA">0 pts</span>
                </div>

                <div class="time segundo" id="timeB">
                    <span>Reino do Norte</span>
                    <span id="placarB">0 pts</span>
                </div>

            </div>

            
            <div class="descartadas">
                <h3>Letras descartadas</h3>

                <div id="letrasErradas"></div>
            </div>

            <div class="painel">

                <div id="painelPalavra">
                    
                </div>

            </div>

            <h1 id="dica"></h1>


            <div class="entrada">

                <input
                    type="text"
                    id="letra"
                    maxlength="1"
                    autocomplete="off" placeholder="LETRA" style="text-align: center;"
                >
                <button id="btnChutar">
                    Chutar
                </button>
                <button id="btnResposta">
                    Chutar resposta
                </button>

            </div>
        </div>
    </main>
    <footer>
        <p>Batalha Bíblica v1.0</p>
        <p>Desenvolvido por Eduarda Nogueira • © 2026</p>
        <p>@eduarda_eng.software</p>
    </footer>

    <div id="modalResposta" class="modal oculto">

        <div class="modal-conteudo">

            <h2>Chutar resposta</h2>

            <div id="camposResposta"></div>

            <div class="botoes-modal">
                <button id="btnConfirmarResposta">Confirmar</button>
                <button id="btnCancelarResposta">Cancelar</button>
            </div>

        </div>

    </div>

    <div id="modalVitoria" class="modal-vitoria">
        <div class="modal-conteudo-vitoria">
            <h2 >Parabéns!</h2>
            <p>Vocês acertaram a palavra!</p>

            <button id="btnProximaPalavra">
                Próxima Palavra
            </button>
        </div>
    </div>
    
    <script src="../js/placar.js"></script>
    <script src="../js/estadoJogo.js"></script>
    <script src="../js/script-jogo-palavras.js"></script>
</body>
</html>
