<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Equipes</title>
    <link rel="stylesheet" href="../css/style-equipes.css">
</head>
<body>
    <header>
        <a href="../index.html"><h2>Voltar</h2></a>
        <h1>Gerenciar Equipes</h1>
        <a href="#"><h2>Placar</h2></a>
    </header>

    <main>

        <div class="container">

            <div class="card">

                <h1>Gerenciar Equipes</h1>
                <p>Cadastre as equipes que irão participar da partida.</p>

                <div id="lista-equipes">

                    <div class="equipe">
                        <label>Equipe 1</label>
                        <div class="campo">
                            <input type="text" placeholder="Nome da equipe">
                            <button class="remover">🗑</button>
                        </div>
                    </div>

                    <div class="equipe">
                        <label>Equipe 2</label>
                        <div class="campo">
                            <input type="text" placeholder="Nome da equipe">
                            <button class="remover">🗑</button>
                        </div>
                    </div>

                </div>

                <button id="adicionar">
                    + Adicionar equipe
                </button>

                <button id="salvar">
                    Salvar equipes
                </button>

                

            </div>

        </div>
    </main>
    <footer>
        <p>Batalha Bíblica v1.0</p>
        <p>Desenvolvido por Eduarda Nogueira • © 2026</p>
        <p>@eduarda_eng.software</p>
    </footer>
</body>
</html>
