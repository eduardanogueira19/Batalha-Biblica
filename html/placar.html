<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar</title>
    <link rel="stylesheet" href="../css/style-placar.css">
</head>
<body>

<header>
    <a href="../index.html"><h2>Voltar</h2></a>
</header>

<div class="container">

    <div class="card">

        <h1>🏆 Placar</h1>

        <div class="ranking">

            <div class="time primeiro">
                <span>Reino do Sul</span>
                <span id="placarA">0 pts</span>
            </div>

            <div class="time segundo">
                <span>Reino do Norte</span>
                <span id="placarB">0 pts</span>
            </div>

        </div>

        <div class="btnp">
            <button onclick="zerarPlacar()">
                Reiniciar Pontuação
            </button>
            <button class="reiniciar" onclick="reiniciarJogo()">Reiniciar Jogo</button>
        </div>
    
       

    </div>

</div>

<div class="add-dim">

    <select id="timeSelecionado">
        <option value="equipeA">Reino do Sul</option>
        <option value="equipeB">Reino do Norte</option>
    </select>

    <input
        type="number"
        id="quantidade"
        value=""
        min="1"
        placeholder="Pontuação">

    <button onclick="alterarPontuacao('adicionar')">
        Adicionar
    </button>

    <button onclick="alterarPontuacao('remover')">
        Remover
    </button>

</div>


<script src="../js/placar.js"></script>

<script>
function atualizarRanking() {

    const primeiro = document.querySelector(".primeiro");
    const segundo = document.querySelector(".segundo");

    if (placar.reinoSul > placar.reinoNorte) {

        primeiro.innerHTML = `
            <span>🥇 Reino do Sul</span>
            <span id="placarA">${placar.reinoSul} pts</span>
        `;

        segundo.innerHTML = `
            <span>🥈 Reino do Norte</span>
            <span id="placarB">${placar.reinoNorte} pts</span>
        `;

    } else if (placar.reinoNorte > placar.reinoSul) {

        primeiro.innerHTML = `
            <span>🥇 Reino do Norte</span>
            <span id="placarB">${placar.reinoNorte} pts</span>
        `;

        segundo.innerHTML = `
            <span>🥈 Reino do Sul</span>
            <span id="placarA">${placar.reinoSul} pts</span>
        `;

    } else {

        primeiro.innerHTML = `
            <span>🤝 Reino do Sul</span>
            <span id="placarA">${placar.reinoSul} pts</span>
        `;

        segundo.innerHTML = `
            <span>🤝 Reino do Norte</span>
            <span id="placarB">${placar.reinoNorte} pts</span>
        `;

    }

}

atualizarRanking();
</script>
<script src="../js/estadoJogo.js"></script>


</body>
</html>
